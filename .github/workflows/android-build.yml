name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Dummy Google Services & Env files
      run: |
        # Mencegah error dari google-services plugin jika file tidak ditemukan
        echo '{"project_info":{"project_number":"1","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1","android_client_info":{"package_name":"com.aistudio.warmachine.xyztba"}},"api_key":[{"current_key":"dummy"}]}]}' > app/google-services.json
        # Mencegah error dari secrets-gradle-plugin
        echo "GEMINI_API_KEY=dummy" > local.properties

    - name: Generate Debug Keystore Automatically
      run: |
        # Membuat debug.keystore otomatis (default Android) jika tidak ditemukan di runner
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '9.3.1'

    - name: Build Debug APK
      run: gradle assembleDebug -x test -x lint --stacktrace --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WarMachine-APK
        path: app/build/outputs/apk/debug/app-debug.apk
